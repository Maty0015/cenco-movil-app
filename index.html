<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carabineros - Solo Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🛡️</text></svg>">
</head>
<body>

    <div id="screen-login" class="app-screen">
        <div class="login-header-green">
            <div class="institution-logo">🛡️</div>
            <h1>Carabineros de Chile</h1>
            <p>Acceso para Personas Sordas</p>
        </div>
        
        <div class="login-container-card">
            <h2>Iniciar Sesión</h2>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
            
            <form id="form-login-ciudadano" onsubmit="window.testLoginPasoAPaso(event)">
                <div class="input-app-group">
                    <label>Correo Electrónico</label>
                    <div class="input-with-icon">
                        <span class="field-icon">✉️</span>
                        <input type="email" id="app-email" required placeholder="tu@correo.com">
                    </div>
                </div>
                
                <div class="input-app-group">
                    <label>Contraseña</label>
                    <div class="input-with-icon">
                        <span class="field-icon">🔒</span>
                        <input type="password" id="app-pass" required placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary-app">Iniciar Sesión</button>
            </form>
            
            <div class="test-credentials-alert">
                <p><strong>Credenciales de prueba:</strong></p>
                <p>Email: <code>juan.perez@email.com</code></p>
                <p>Contraseña: <code>cenco2026</code></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
